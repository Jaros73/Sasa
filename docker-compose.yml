services:
  ukotoru-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ukotoru/web:local
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  edge:
    external: true