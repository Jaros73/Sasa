services:
  ukotoru-web:
    container_name: ukotoru-web
    build:
      context: .
      dockerfile: Infra/Dockerfile
    image: ukotoru/web:local
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  edge:
    external: true
    name: revicall_edge